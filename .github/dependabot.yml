version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 10
    # Security patches matter most; keep noise down by not chasing every
    # patch/minor bump automatically — GitHub still opens PRs for any advisory
    # regardless of these ignore rules, since those aren't just version bumps.
    ignore:
      - dependency-name: "*"
        update-types: ["version-update:semver-minor", "version-update:semver-patch"]

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
