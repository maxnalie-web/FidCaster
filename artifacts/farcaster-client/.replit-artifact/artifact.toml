kind = "web"
  previewPath = "/"
  title = "Farcaster Client"
  version = "1.0.0"
  id = "artifacts/farcaster-client"
  router = "path"

  [[integratedSkills]]
  name = "react-vite"
  version = "1.0.0"

  [[services]]
  name = "web"
  paths = [ "/" ]
  localPort = 5173

  [services.development]
  run = "pnpm --filter @workspace/farcaster-client run dev"

  [services.production]
  build = [ "pnpm", "--filter", "@workspace/farcaster-client", "run", "build" ]
  run = "pnpm --filter @workspace/farcaster-client run start"

  [services.env]
  PORT = "5173"
  BASE_PATH = "/"
  